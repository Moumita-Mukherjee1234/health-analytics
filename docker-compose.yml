services:

  postgres:
    image: postgres:16

    container_name: hospital_postgres

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: hospitaldb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  analytics:

    build:
      context: .
      dockerfile: docker/Dockerfile

    container_name: health_analytics

    ports:
      - "8888:8888"

    volumes:
      - .:/app

    working_dir: /app

    depends_on:
      - postgres

    command: >
      jupyter notebook
      --ip=0.0.0.0
      --port=8888
      --allow-root
      --no-browser

volumes:
  postgres_data: